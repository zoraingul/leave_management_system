<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main" style="margin:auto; width:400px;">

  <h1>Login</h1>

  <form id="loginForm">

    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <label>Role</label>
    <select id="role">
      <option>Employee</option>
      <option>Admin</option>
    </select>

    <button type="submit">
      Login
    </button>

  </form>

</div>

<script src="script.js"></script>
</body>
</html>
